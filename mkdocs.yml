site_name: marketkit
site_description: Reliable, clean market data and analytics — pure Python, no C dependencies.
repo_url: https://github.com/aditya33agrawal/marketkit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
    - scheme: slate
      primary: indigo

nav:
  - Home: index.md
  - API reference: api.md
  - Architecture (tech plan): tech-plan.md
  - Roadmap: roadmap.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
